name: Build & Release Packages

on:
  push:
    tags:
      - "v*"
      - "*-beta"
      - "*-dev"
  workflow_dispatch:

jobs:
  # Briefcase for AppImages, deb and rpm (replaces custom script and fpm)
  build:
    name: Build ${{ matrix.format }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            format: appimage
            args: "--no-docker"
          - os: ubuntu-latest
            format: system
            args: ""
          - os: ubuntu-latest
            format: system
            args: ""
            container: fedora:40

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies (Ubuntu)
        if: matrix.container == ''
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libfuse2 binutils debhelper devscripts

      - name: Install Build Dependencies (Fedora)
        if: matrix.container != ''
        run: |
          dnf install -y python3-pip python3-devel gcc git rpm-build mesa-libGL libxcb
          # Fix the Fedora packaging conflict
          python3 -m pip install --upgrade pip

      - name: Set up Python
        if: matrix.container == ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Briefcase
        run: |
          # Use --ignore-installed to bypass the RPM 'packaging' conflict in Fedora
          python3 -m pip install briefcase --ignore-installed

      - name: Build Package
        run: |
          briefcase package linux ${{ matrix.format }} ${{ matrix.args }} --no-input

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          find dist/ -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} output/ \;

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: output/*
          append_body: true
          generate_release_notes: true
  
  # for binary
  build-tarball:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.13"

        - name: Install dependencies
          run: |
            pip install pyinstaller PyQt6 psutil pyudev requests packaging platformdirs

        - name: Build with PyInstaller
          run: |
            pyinstaller --noconfirm --onedir --windowed \
            --icon "src/lufus/gui/assets/icons/lufuslogo.ico" \
            --paths "./src" \
            --add-data "src/lufus/gui/assets:lufus/gui/assets" \
            --add-data "src/lufus/gui/languages:lufus/gui/languages" \
            --add-data "src/lufus/gui/themes:lufus/gui/themes" \
            --collect-all PySide6 \
            --name "Lufus-x86_64-${{ github.ref_name }}" \
            "src/lufus/__main__.py"

        - name: Create Tarball and Checksum
          run: |
            cd dist
            tar -cvzf ../Lufus-x86_64-${{ github.ref_name }}.tar.gz Lufus-x86_64-${{ github.ref_name }}
            cd ..
            sha256sum Lufus-x86_64-${{ github.ref_name }}.tar.gz > Lufus-x86_64-${{ github.ref_name }}.tar.gz.sha256

        - name: Upload to Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ github.ref_name }}
            files: |
              Lufus-x86_64-${{ github.ref_name }}.tar.gz
              Lufus-x86_64-${{ github.ref_name }}.tar.gz.sha256
            append_body: true
            
